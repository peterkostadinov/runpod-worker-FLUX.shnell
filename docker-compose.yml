services:
  worker:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # HuggingFace auth — required for gated models
      - HF_TOKEN=${HF_TOKEN}
      # Alias used by older huggingface_hub versions
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - HF_MODEL=${HF_MODEL:-black-forest-labs/FLUX.1-schnell}
    volumes:
      # Persist downloaded model weights across container restarts
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        limits:
          memory: 24G
        reservations:
          memory: 16G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Run with: docker compose run --rm worker-test
  # Processes test_input.json once then exits — does NOT start the persistent server.
  worker-test:
    extends:
      service: worker
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./test_input.json:/test_input.json:ro

volumes:
  hf_cache:
