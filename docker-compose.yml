services:

  # ---------------------------------------------------------------------------
  # 1. Queue broker
  #    notify-keyspace-events Ex enables TTL-expiry events that redis_worker
  #    uses to delete image files when a job record expires.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --notify-keyspace-events Ex
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # 2. API gateway
  #    Lightweight FastAPI: accepts job submissions, serves status + images.
  #    No GPU, no model weights.  local_server.py is bind-mounted so the
  #    Dockerfile stays untouched.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - API_KEY=${API_KEY:-}
      - REDIS_URL=redis://redis:6379
      - IMAGE_DIR=/images
    volumes:
      - image_store:/images
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # 3. GPU inference worker
  #    Runs handler.py as a RunPod-style local HTTP server (--rp_serve_api).
  #    Only reachable internally by redis_worker — no external port binding.
  # ---------------------------------------------------------------------------
  worker:
    build: .
    command: ["python3", "-u", "/handler.py", "--rp_serve_api", "--rp_api_host", "0.0.0.0"]
    env_file:
      - .env
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - HF_MODEL=${HF_MODEL:-black-forest-labs/FLUX.1-schnell}
    volumes:
      - hf_cache:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 24G
        reservations:
          memory: 16G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ---------------------------------------------------------------------------
  # 4. Redis queue bridge
  #    BLPOPs jobs from Redis, POSTs them to worker /runsync, saves the
  #    returned images to the shared volume, writes results back to Redis with
  #    a 60-min TTL, and deletes image files when the TTL fires.
  #    No GPU needed.  redis_worker.py is bind-mounted.
  # ---------------------------------------------------------------------------
  redis_worker:
    build:
      context: .
      dockerfile: Dockerfile.redis_worker
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - WORKER_URL=http://worker:8000
      - IMAGE_DIR=/images
    volumes:
      - image_store:/images
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # 5. RunPod handler smoke-test (excluded from `docker compose up`)
  #    Runs handler.py exactly as RunPod does — processes test_input.json
  #    and exits.  Run with:  docker compose run --rm worker-test
  # ---------------------------------------------------------------------------
  worker-test:
    profiles: ["test"]
    build: .
    command: ["python3", "-u", "/handler.py"]
    env_file:
      - .env
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - HF_MODEL=${HF_MODEL:-black-forest-labs/FLUX.1-schnell}
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./test_input.json:/test_input.json:ro
    deploy:
      resources:
        limits:
          memory: 24G
        reservations:
          memory: 16G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  hf_cache:
  redis_data:
  image_store:

