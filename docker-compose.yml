services:
  worker:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # HuggingFace auth — required for gated models
      - HF_TOKEN=${HF_TOKEN}
      # Alias used by older huggingface_hub versions
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - HF_MODEL=${HF_MODEL:-black-forest-labs/FLUX.1-schnell}
    volumes:
      # Persist downloaded model weights across container restarts
      - hf_cache:/root/.cache/huggingface
      # Mount test input locally only — not baked into the image so RunPod won't auto-run it
      - ./test_input.json:/test_input.json:ro
    deploy:
      resources:
        limits:
          memory: 24G
        reservations:
          memory: 16G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  hf_cache:
